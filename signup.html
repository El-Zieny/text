<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="src/images/sport-car.png" type="image/x-icon">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="src/style.css" />    <title>Sign Up</title>
  </head>
  <body>
    <a
      href="../../index.html"
      class="top-4 left-4 absolute hover:bg-gray-600 bg-[#1a1a1a] border border-gray-600  p-2 rounded-md">
      <img
        class="size-6"
        src="src/images/ai/Icon (1).svg"
        alt />
    </a>
    <div
      class="w-full min-h-dvh bg-black text-white flex justify-center items-center p-4">
      <div
        class="flex gap-8 mt-16 w-full max-w-[900px] flex-col lg:flex-row items-center lg:items-stretch">

        <!-- Left Side Card -->
        <div
          class="signup-gradient rounded-l-3xl flex flex-col items-center justify-center py-12 px-8 w-full lg:min-w-5/12 lg:max-w-5/12 lg:min-h-[500px]">
          <div
            class="w-16 h-16 rounded-full flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-[#7A8195]" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </div>
          <h3 class="text-xl font-bold text-center mb-2">Quick Sign Up</h3>
          <p class="text-sm text-[#A09590] text-center mb-6">Use your social
            account</p>

          <button
            class="bg-white w-full h-11 rounded-lg flex items-center justify-center gap-2 text-gray-800 font-medium text-sm hover:bg-gray-100 transition-colors mb-2">
            <img src="src/images/auth/google.svg" alt="Google" class="w-4 h-4">
            Sign up with Google
          </button>
          <button
            class="bg-blue-600 w-full h-11 rounded-lg flex items-center justify-center gap-2 text-white font-medium text-sm hover:bg-blue-700 transition-colors">
            <img src="src/images/auth/fb.svg" alt="Facebook" class="w-4 h-4">
            Sign up with Facebook
          </button>
        </div>

        <!-- Right Side Form -->
        <div class="w-full lg:w-2/3 py-12">
          <h1 class="text-4xl font-bold mb-2">Create Your Account</h1>
          <p class="text-[#7A8195] text-sm mb-8">Fill in your details to get
            started</p>

          <form id="signupForm" class="flex flex-col gap-5">
            <!-- First Name & Last Name -->
            <div class="grid grid-cols-2 gap-4">
              <div class="flex flex-col gap-2">
                <label for="firstName"
                  class="text-sm text-gray-300 capitalize tracking-wide">First
                  Name</label>
                <input type="text" id="firstName" placeholder="John"
                  class="border border-[#D1D5DC] rounded-lg px-4 py-3 text-white text-sm placeholder-[#9CA3AF] outline-none focus:border-primary transition-colors"
                  required>
              </div>
              <div class="flex flex-col gap-2">
                <label for="lastName"
                  class="text-sm text-gray-300 capitalize tracking-wide">Last
                  Name</label>
                <input type="text" id="lastName" placeholder="Doe"
                  class="border border-[#D1D5DC] rounded-lg px-4 py-3 text-white text-sm placeholder-[#9CA3AF] outline-none focus:border-primary transition-colors"
                  required>
              </div>
            </div>

            <!-- Email Input -->
            <div class="flex flex-col gap-2">
              <label for="email"
                class="text-sm text-gray-300 capitalize tracking-wide">Email
                Address</label>
              <div
                class="flex items-center border border-[#D1D5DC] rounded-lg px-4 py-3 focus-within:border-primary transition-colors">
                <svg class="w-6 h-6 text-[#7A8195] mr-3 flex-shrink-0"
                  fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <input type="email" id="email" placeholder="you@example.com"
                  class="bg-transparent outline-none flex-1 text-white text-sm placeholder-[#9CA3AF]"
                  required>
              </div>
            </div>

            <!-- Password Input -->
            <div class="flex flex-col gap-2">
              <label
                for="password"
                class="text-sm text-gray-300 capitalize tracking-wide">
                Password
              </label>

              <div
                class="flex items-center border border-[#D1D5DC] rounded-lg px-4 py-3 focus-within:border-primary transition-colors">
                <svg
                  class="w-6 h-6 text-[#7A8195] mr-3 flex-shrink-0"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>

                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  class="bg-transparent outline-none flex-1 text-white text-sm placeholder-[#9CA3AF]"
                  required />
              </div>

              <p class="text-xs text-gray-400">
                Must be at least 8 characters and contain an uppercase letter
                and a number.
              </p>

              <div
                id="passwordError"
                class="text-red-400 text-sm hidden"></div>
            </div>

            <!-- Confirm Password Input -->
            <div class="flex flex-col gap-2">
              <label for="confirmPassword"
                class="text-sm text-gray-300 capitalize tracking-wide">Confirm
                Password</label>
              <div
                class="flex items-center border border-[#D1D5DC] rounded-lg px-4 py-3 focus-within:border-primary transition-colors">
                <svg class="w-6 h-6 text-[#7A8195] mr-3 flex-shrink-0"
                  fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
                <input type="password" id="confirmPassword"
                  placeholder="••••••••"
                  class="bg-transparent outline-none flex-1 text-white text-sm placeholder-[#9CA3AF]"
                  required>
              </div>
            </div>

            <!-- Terms Checkbox -->
            <div class="flex items-start gap-2">
              <input type="checkbox" id="terms"
                class="w-5 h-5 cursor-pointer rounded appearance-none checked:appearance-auto border border-[#4A4A4A] checked:bg-primary checked:border-primary accent-primary flex-shrink-0"
                required>
              <label for="terms"
                class="text-xs md:text-sm text-[#7A8195] cursor-pointer">
                I agree to the <a href="#"
                  class="text-white hover:text-primary transition-colors">Terms
                  of Service</a> and <a href="#"
                  class="text-white hover:text-primary transition-colors">Privacy
                  Policy</a>
              </label>
            </div>

            <!-- Create Account Button -->
            <button type="submit"
              class="bg-primary font-bold py-3 rounded-lg hover:bg-yellow-500 transition-colors cursor-pointer text-base">
              Create Account
            </button>

            <!-- Sign In Link -->
            <div class="text-center text-sm">
              <span class="text-[#7A8195]">Already have an account?</span>
              <a href="login.html"
                class="text-white hover:text-primary transition-colors ml-1 font-semibold">Sign
                in</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordInput = document.getElementById('password');

      function validatePasswords() {
        if (passwordInput.value !== confirmPasswordInput.value) {
          confirmPasswordInput.setCustomValidity('Passwords do not match');
        } else {
          confirmPasswordInput.setCustomValidity('');
        }
      }

      passwordInput.addEventListener('input', validatePasswords);
      confirmPasswordInput.addEventListener('input', validatePasswords);

      async function register(name, email, password) {
        const response = await fetch(
          'https://backend-project1-production.up.railway.app/auth/register',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name,
              email,
              password
            })
          }
        );
        
        const data = await response.json();
        
        console.log("Sent:", { name, email, password });
        console.log("Response:", data);
        
        if (data.success) {
          localStorage.setItem('jwt', data.token);
          return data.user;
        }
      
        throw new Error(
          JSON.stringify(data, null, 2)
        );
      }
      
      const form = document.getElementById('signupForm');
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const name = `${firstName} ${lastName}`.trim();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const user = await register(name, email, password);
        
          console.log(user);
        
          alert('Account created successfully!');
          window.location.href = 'chat.html';
        } catch (err) {
          alert(err.message);
        }
      });
      function validatePassword() {
  const password = passwordInput.value;
  const errors = [];

  if (password.length < 8) {
    errors.push(
      "Password must be at least 8 characters long"
    );
  }

  if (!/[A-Z]/.test(password)) {
    errors.push(
      "Password must contain at least one uppercase letter"
    );
  }

  if (!/\d/.test(password)) {
    errors.push(
      "Password must contain at least one number"
    );
  }

  if (errors.length) {
    passwordInput.setCustomValidity(
      errors.join("\n")
    );
  } else {
    passwordInput.setCustomValidity("");
  }
}
passwordInput.addEventListener(
  "input",
  validatePassword
);

    </script>
  </body>
</html>
