<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="src/images/sport-car.png" type="image/x-icon">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="src/style.css" />    <title>Login</title>
  </head>
  <body>
    <a
      href="../../index.html"
      class="top-4 left-4 absolute hover:bg-gray-600 bg-[#1a1a1a] border border-gray-600  p-2 rounded-md">
      <img
        class="size-6"
        src="src/images/ai/Icon (1).svg"
        alt />
    </a>
    <div
      class="w-full min-h-dvh bg-black text-white flex justify-center items-center p-4">
      <div
        class="bg-[#1A1A1A] mt-2 flex flex-col items-center py-8 md:py-12 px-6 md:px-12 lg:px-14 rounded-lg w-full max-w-[420px] md:max-w-[500px] lg:max-w-[520px]">
        <div class="title flex flex-col items-center gap-2 mb-6 md:mb-8">
          <h2
            class="text-3xl md:text-4xl lg:text-4xl font-bold text-center">Welcome
            Back</h2>
          <p class="text-[#7A8195] text-xs md:text-sm text-center">Sign in to
            continue</p>
        </div>

        <!-- Social Login Buttons -->
        <div class="flex flex-col gap-2 md:gap-3 w-full mb-4 md:mb-6">
          <button
            class="bg-white w-full h-11 md:h-12 rounded-lg flex items-center justify-center gap-2 text-gray-800 font-medium text-sm md:text-base hover:bg-gray-100 transition-colors">
            <img src="src/images/auth/google.svg" alt="Google"
              class="w-4 md:w-5 h-4 md:h-5">
            Continue with Google
          </button>
          <button
            class="bg-blue-600 w-full h-11 md:h-12 rounded-lg flex items-center justify-center gap-2 text-white font-medium text-sm md:text-base hover:bg-blue-700 transition-colors">
            <img src="src/images/auth/fb.svg" alt="Facebook"
              class="w-4 md:w-5 h-4 md:h-5">
            Continue with Facebook
          </button>

          <!-- Divider -->
          <div class="flex items-center my-1 md:my-2">
            <div class="flex-1 h-px bg-[#D1D5DC]"></div>
            <span
              class="text-[#7A8195] px-3 md:px-4 bg-white rounded-lg text-xs md:text-sm">Or
              continue with email</span>
            <div class="flex-1 h-px bg-[#D1D5DC]"></div>
          </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="flex flex-col gap-4 md:gap-5 w-full">
          <!-- Email Input -->
          <div class="flex flex-col gap-1 md:gap-2">
            <label for="email"
              class="text-xs md:text-sm text-[#7A8195] capitalize tracking-wide">Email
              Address</label>
            <div
              class="flex items-center bg-[#2A2A2A] border border-[#D1D5DC] rounded-lg px-3 md:px-4 py-2 md:py-3 focus-within:border-primary transition-colors">
              <svg
                class="w-4 md:w-5 h-4 md:h-5 text-[#7A8195] mr-2 md:mr-3 flex-shrink-0"
                fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <input type="email" id="email" placeholder="you@example.com"
                class="bg-transparent outline-none flex-1 text-white text-sm md:text-base placeholder-[#9CA3AF]"
                required>
            </div>
          </div>

          <!-- Password Input -->
          <div class="flex flex-col gap-1 md:gap-2">
            <label for="password"
              class="text-xs md:text-sm text-[#7A8195] capitalize tracking-wide">Password</label>
            <div
              class="flex items-center bg-[#2A2A2A] border border-[#D1D5DC] rounded-lg px-3 md:px-4 py-2 md:py-3 focus-within:border-primary transition-colors">
              <svg
                class="w-4 md:w-5 h-4 md:h-5 text-[#7A8195] mr-2 md:mr-3 flex-shrink-0"
                fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
              <input type="password" id="password" placeholder="••••••••"
                class="bg-transparent outline-none flex-1 text-white text-sm md:text-base placeholder-[#9CA3AF]"
                required>
            </div>
          </div>

          <!-- Remember me & Forgot password -->
          <div class="flex justify-between items-center gap-2 mt-0 md:mt-1">
            <label class="flex items-center gap-2 cursor-pointer flex-shrink-0">
              <input type="checkbox"
                class="w-4 h-4 md:w-5 md:h-5 cursor-pointer rounded appearance-none checked:appearance-auto bg-[#2A2A2A] border border-[#4A4A4A] checked:bg-primary checked:border-primary accent-primary">
              <span class="text-xs md:text-sm text-white">Remember me</span>
            </label>
            <a href="forgot-password.html"
              class="text-xs md:text-sm text-[#7A8195] hover:text-primary transition-colors whitespace-nowrap">Forgot
              password?</a>
          </div>

          <!-- Sign In Button -->
          <button type="submit"
            class="bg-primary font-bold py-2 md:py-3 rounded-lg hover:bg-yellow-500 transition-colors mt-2 md:mt-3 cursor-pointer text-sm md:text-base">
            Sign In
          </button>

          <!-- Sign Up Link -->
          <div class="text-center text-xs md:text-sm">
            <span class="text-[#7A8195]">Don't have an account?</span>
            <a href="signup.html"
              class="text-white hover:text-primary transition-colors ml-1 font-semibold">Sign
              up</a>
          </div>
        </form>
      </div>
    </div>
    <script>
  const form = document.getElementById('loginForm');

  async function login(email, password) {
    const response = await fetch(
      'https://backend-project1-production.up.railway.app/auth/login',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email,
          password
        })
      }
    );

    const data = await response.json();

    console.log(data);

    if (data.success) {
      console.log("LOGIN RESPONSE:", data);
      localStorage.setItem('jwt', data.token || data.accessToken);
      return data.user;
    } else {
      throw new Error(data.message || 'Login failed');
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document
      .getElementById('email')
      .value
      .trim();

    const password =
      document.getElementById('password').value;

    try {
      const user = await login(
        email,
        password
      );

      console.log('Logged in user:', user);

      // غيّر المسار حسب مكان صفحة الشات
      window.location.href = '../../index.html';
    } catch (error) {
      console.error(error);
      alert(error.message);
    }
  });
  console.log(data)
    </script>
  </body>
</html>
