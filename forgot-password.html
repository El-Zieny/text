<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="src/images/sport-car.png" type="image/x-icon">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="src/style.css" />    <title>Forgot Password</title>
  </head>
  <body>
    <a
      href="../../index.html"
      class="top-4 left-4 absolute hover:bg-gray-600 bg-[#1a1a1a] border border-gray-600  p-2 rounded-md">
      <img
        class="size-6"
        src="src/images/ai/Icon (1).svg"
        alt />
    </a>
    <div
      class="w-full min-h-dvh bg-black text-white flex justify-center items-center p-4">
      <div
        class=" flex flex-col items-center py-12 px-6 md:px-12 lg:px-14 rounded-lg w-full max-w-[420px] md:max-w-[500px] lg:max-w-[520px]">

        <div class="text-center mb-8">
          <h1 class="text-3xl md:text-4xl font-bold mb-2">Forgot Password?</h1>
          <p class="text-gray-500 text-sm">Enter your email address and we will
            send you<br>instructions to reset your password</p>
        </div>

        <form class="flex flex-col gap-5 w-full">
          <!-- Email Input -->
          <div class="flex flex-col gap-4">
            <label for="email"
              class="text-sm text-gray-200 capitalize tracking-wide">Email
              Address</label>
            <div
              class="flex items-center border border-[#D1D5DC] rounded-lg px-4 py-3 focus-within:border-primary transition-colors">
              <svg class="w-5 h-5 text-[#7A8195] mr-3 flex-shrink-0" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <input type="email" id="email" placeholder="you@example.com"
                class="bg-transparent outline-none flex-1 text-white text-sm placeholder-[#9CA3AF]"
                required>
            </div>
          </div>

          <!-- Send Reset Link Button -->
          <button type="submit"
            class="bg-primary font-bold py-3 rounded-lg hover:bg-yellow-500 transition-colors cursor-pointer text-sm md:text-base">
            Send Reset Link
          </button>

          <!-- Back to Login Link -->
          <div class="text-center flex gap-8 mt-2">
            <span class="text-gray-500">Remember your password?</span>

            <a href="login.html"
              class="text-primary hover:text-yellow-500 transition-colors ml-1 font-semibold">Back
              to login</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
